name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# -----------------------------------------------------------------------------
# Every job binds to the `ci-approval` environment. That environment must be
# configured in repo Settings → Environments → New environment → `ci-approval`
# with "Required reviewers" enabled. Once set, GitHub pauses every job's first
# step and waits for a reviewer to approve before running.
#
# Secrets scoped to this environment (e.g. OPENROUTER_API_KEY) flow through
# normally once approval is granted.
# -----------------------------------------------------------------------------

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: ci-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        env:
          # Exposed after approval so the E1 real-LLM proof-of-life test
          # exercises OpenRouter. The test auto-skips when this is absent
          # (e.g. on forks without the secret configured).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cargo test --all-features

      - name: Run release-only integration tests (egress frozen-prefix release twin)
        env:
          # egress_integration.rs has a #[cfg(not(debug_assertions))] test
          # (frozen_prefix_violation_rejects_request_in_release) that only
          # compiles in release mode. Debug `cargo test` above skips it;
          # this step exercises the release twin so REQ-001's release-build
          # behavior is verified on every PR.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cargo test --release --test egress_integration

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    environment: ci-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  rustfmt:
    name: Format Check
    runs-on: ubuntu-latest
    environment: ci-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  rigor-validate:
    name: Rigor Self-Validation
    runs-on: ubuntu-latest
    environment: ci-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Rigor
        run: cargo build --release

      - name: Run Rigor on itself
        run: ./target/release/rigor validate --path rigor.yaml
