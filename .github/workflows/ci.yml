name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# -----------------------------------------------------------------------------
# Approval-gate policy (updated — closes #11 and #27):
#
# Only jobs that BURN LLM credits (i.e. access OPENROUTER_API_KEY) are gated
# behind the `ci-approval` environment. Static-analysis jobs (clippy, rustfmt,
# rigor-validate) run unconditionally so routine PRs get fast, non-blocking
# feedback on basic hygiene.
#
#   Gated (LLM credit surface):
#     - test  (real_llm.rs::e1_openrouter_proof_of_life reads OPENROUTER_API_KEY)
#
#   Ungated (no secrets, no LLM calls, purely deterministic):
#     - clippy
#     - rustfmt
#     - rigor-validate
#
# GitHub already withholds secrets from pull_request workflows on fork PRs,
# so the gate on the test job is only meaningful as a speed-bump for
# same-repo PRs. We keep it because real-LLM calls burn per-run credits
# and a reviewer-in-the-loop is a reasonable spend-check.
# -----------------------------------------------------------------------------

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    environment: ci-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        env:
          # Exposed after approval so the E1 real-LLM proof-of-life test
          # exercises OpenRouter. The test auto-skips when this is absent
          # (e.g. on forks without the secret configured).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cargo test --all-features

      - name: Run release-only integration tests (egress frozen-prefix release twin)
        env:
          # egress_integration.rs has a #[cfg(not(debug_assertions))] test
          # (frozen_prefix_violation_rejects_request_in_release) that only
          # compiles in release mode. Debug `cargo test` above skips it;
          # this step exercises the release twin so REQ-001's release-build
          # behavior is verified on every PR.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: cargo test --release --test egress_integration

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Guard against raw HOME for .rigor paths
        run: |
          # All .rigor/ path resolution must go through crate::paths::rigor_home().
          # Category B sites (non-.rigor HOME usage) are allowlisted with '// rigor-home-ok'.
          VIOLATIONS=$(grep -rn 'dirs::home_dir\|env::var("HOME")\|env::var_os("HOME")' \
            crates/rigor/src/ \
            --include='*.rs' \
            | grep -v 'src/paths.rs' \
            | grep -v 'rigor-home-ok' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Raw HOME access found outside paths.rs. Use crate::paths::rigor_home() instead, or add '// rigor-home-ok' for non-.rigor/ paths."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi

  rustfmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  rigor-validate:
    name: Rigor Self-Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Rigor
        run: cargo build --release

      - name: Run Rigor on itself
        run: ./target/release/rigor validate --path rigor.yaml

      - name: Corpus replay consistency check
        run: cargo test -p rigor --test corpus_replay --release -- --nocapture

      - name: Corpus proxy replay smoke
        run: cargo test -p rigor --test corpus_proxy_replay --release -- --nocapture

  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  cargo-deny:
    name: License & Supply Chain Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check

  coverage:
    name: Coverage Floor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run coverage
        run: cargo llvm-cov --workspace --fail-under-lines 60

  bench-gate:
    name: Bench Regression Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Restore bench baseline
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ runner.os }}-${{ hashFiles('crates/rigor/benches/**') }}
          restore-keys: |
            criterion-baseline-${{ runner.os }}-

      - name: Run benchmarks
        run: cargo bench --bench hook_latency --bench evaluation_only --bench dfquad_scaling --bench filter_chain_overhead -- --output-format bencher 2>&1 | tee bench-output.txt

      - name: Check for regressions
        run: |
          # Parse criterion output for regressions.
          # Criterion reports "regressed" in its comparison output when
          # performance degrades beyond the noise threshold.
          if grep -q "regressed" bench-output.txt; then
            echo "::warning::Benchmark regressions detected -- review bench-output.txt"
            # Extract regression percentages and fail if any exceed 20%
            # Criterion outputs lines like: "change: +25.123% (p = 0.00 < 0.05)"
            REGRESSIONS=$(grep -A2 "regressed" bench-output.txt \
              | grep -oP '[+-]\d+\.\d+%' \
              | sed 's/[+%]//g' \
              | awk '$1 > 20 { found=1 } END { if (found) print "FAIL"; else print "OK" }')
            if [ "$REGRESSIONS" = "FAIL" ]; then
              echo "::error::Benchmark regression exceeds 20% threshold"
              cat bench-output.txt
              exit 1
            fi
            echo "Regressions detected but within 20% tolerance"
          fi

      - name: Save baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ runner.os }}-${{ hashFiles('crates/rigor/benches/**') }}
