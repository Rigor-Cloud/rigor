# Rigor constraint configuration
# Project type: Rust
# Generated by: rigor init
#
# Three tiers of constraints:
#   1. Language defaults — truths about the language itself
#   2. Dependency constraints — truths about specific libraries
#   3. Project constraints — run /rigor:map to generate these

constraints:
  beliefs:

    # ── Rust Language Defaults ──────────────────────────────────────
    # Truths about the Rust language itself. Auto-included for Rust projects.

    - id: rust-no-gc
      epistemic_type: belief
      name: "Rust Has No Garbage Collector"
      description: "Rust uses ownership and borrowing for memory management, not garbage collection. Claims that Rust has a GC are wrong."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "[package]"
          context: "This is a Rust project — ownership model applies"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rust.*(garbage.collect|gc|tracing.gc|mark.sweep|reference.count)`, c.text)
          not regex.match(`(?i)(no gc|no garbage|doesn.t have|lacks|without)`, c.text)
          v := {
            "constraint_id": "rust-no-gc",
            "violated": true,
            "claims": [c.id],
            "reason": "Rust does not have garbage collection — it uses ownership and borrowing"
          }
        }
      message: "Rust does not have a garbage collector"
      tags: ["rust", "language", "memory"]
      domain: "rust"

    - id: rust-no-null
      epistemic_type: belief
      name: "Rust Has No Null"
      description: "Rust has no null/nil/None pointer. It uses Option<T> for optional values. Claims about null in Rust are wrong."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "[package]"
          context: "Rust project — no null, uses Option<T>"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rust.*(null pointer|null reference|nil|nullptr|NullPointerException)`, c.text)
          not regex.match(`(?i)(no null|doesn.t have null|Option|None)`, c.text)
          v := {
            "constraint_id": "rust-no-null",
            "violated": true,
            "claims": [c.id],
            "reason": "Rust has no null — it uses Option<T> for optional values"
          }
        }
      message: "Rust has no null — uses Option<T>"
      tags: ["rust", "language", "types"]
      domain: "rust"

    - id: rust-no-exceptions
      epistemic_type: belief
      name: "Rust Has No Exceptions"
      description: "Rust uses Result<T, E> for error handling, not try/catch exceptions. panic! exists but is not exception handling."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "[package]"
          context: "Rust project — Result<T,E> not exceptions"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rust.*(try.catch|throw|exception|except|catch.block)`, c.text)
          not regex.match(`(?i)(no exception|doesn.t have|Result|panic)`, c.text)
          v := {
            "constraint_id": "rust-no-exceptions",
            "violated": true,
            "claims": [c.id],
            "reason": "Rust uses Result<T,E> for error handling, not try/catch exceptions"
          }
        }
      message: "Rust has no exceptions — uses Result<T,E>"
      tags: ["rust", "language", "errors"]
      domain: "rust"

    - id: rust-no-inheritance
      epistemic_type: belief
      name: "Rust Has No Class Inheritance"
      description: "Rust uses traits and composition, not class inheritance. There are no classes in Rust."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "[package]"
          context: "Rust project — traits not classes"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rust.*(class|inherit|extends|superclass|subclass|override method)`, c.text)
          not regex.match(`(?i)(no class|no inherit|trait|doesn.t have|composition)`, c.text)
          v := {
            "constraint_id": "rust-no-inheritance",
            "violated": true,
            "claims": [c.id],
            "reason": "Rust has no classes or inheritance — it uses traits and composition"
          }
        }
      message: "Rust has no class inheritance — uses traits"
      tags: ["rust", "language", "oop"]
      domain: "rust"

    - id: rust-ownership
      epistemic_type: belief
      name: "Rust Ownership Rules"
      description: "Each value has exactly one owner. Borrowing: either one &mut OR many &, never both simultaneously."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "[package]"
          context: "Rust project — ownership rules apply"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rust.*(multiple owners|shared ownership|no ownership|copy by default)`, c.text)
          not regex.match(`(?i)(Rc|Arc|Clone|shared_ptr)`, c.text)
          v := {
            "constraint_id": "rust-ownership",
            "violated": true,
            "claims": [c.id],
            "reason": "Each Rust value has exactly one owner — shared ownership requires Rc/Arc"
          }
        }
      message: "Incorrect Rust ownership claim"
      tags: ["rust", "language", "ownership"]
      domain: "rust"

    - id: regorus-capabilities
      epistemic_type: belief
      name: "Regorus Is a Subset of OPA"
      description: "regorus is a Rust implementation of a SUBSET of OPA/Rego. It does not support http.send, opa.runtime, net.cidr, or other network/runtime built-ins."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "regorus"
          context: "regorus dependency declaration"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)regorus.*(supports|provides|enables|can|capable|has)`, c.text)
          regex.match(`(?i)(streaming|async|parallel|hot.reload|watch.mode|interactive|IDE|http\.send|opa\.runtime|net\.cidr)`, c.text)
          v := {
            "constraint_id": "regorus-capabilities",
            "violated": true,
            "claims": [c.id],
            "reason": "regorus is a subset of OPA and does not support this feature"
          }
        }
      message: "regorus is a Rego subset, not full OPA"
      tags: ["regorus", "dependency", "rego"]
      domain: "dependency"
      references:
        - "https://github.com/microsoft/regorus"

    - id: tokio-is-async-runtime
      epistemic_type: belief
      name: "Tokio Is an Async Runtime"
      description: "tokio is an async runtime using cooperative scheduling on a thread pool. It is NOT an OS-level thread library or green threads implementation."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "tokio"
          context: "tokio dependency"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)tokio.*(green.thread|preemptive|os.thread|fiber|goroutine)`, c.text)
          not regex.match(`(?i)(not|isn.t|doesn.t|unlike)`, c.text)
          v := {
            "constraint_id": "tokio-is-async-runtime",
            "violated": true,
            "claims": [c.id],
            "reason": "tokio uses cooperative async scheduling, not green threads or preemptive threading"
          }
        }
      message: "tokio is async/cooperative, not green threads"
      tags: ["tokio", "dependency", "async"]
      domain: "dependency"

    - id: axum-is-tower-based
      epistemic_type: belief
      name: "Axum Uses Tower Middleware"
      description: "axum is built on tower and hyper, not actix-web. It uses tower middleware and extractors, not actix guards or handlers."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "axum"
          context: "axum dependency"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)axum.*(actix|rocket|warp|tide)`, c.text)
          regex.match(`(?i)(uses|built.on|based.on|wraps|powered.by)`, c.text)
          v := {
            "constraint_id": "axum-is-tower-based",
            "violated": true,
            "claims": [c.id],
            "reason": "axum is built on tower/hyper, not the framework claimed"
          }
        }
      message: "axum is tower-based, not actix/rocket/warp"
      tags: ["axum", "dependency", "web"]
      domain: "dependency"

    - id: reqwest-is-http-client
      epistemic_type: belief
      name: "Reqwest Is an HTTP Client"
      description: "reqwest is an HTTP CLIENT library. It is not a server, framework, or proxy. It supports connection pooling via Client reuse."
      source:
        - path: crates/rigor/Cargo.toml
          anchor: "reqwest"
          context: "reqwest dependency"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)reqwest.*(server|framework|listen|bind|route|handler)`, c.text)
          not regex.match(`(?i)(client|request|send|get|post)`, c.text)
          v := {
            "constraint_id": "reqwest-is-http-client",
            "violated": true,
            "claims": [c.id],
            "reason": "reqwest is an HTTP client library, not a server or framework"
          }
        }
      message: "reqwest is an HTTP client, not a server"
      tags: ["reqwest", "dependency", "http"]
      domain: "dependency"

    # ── Project Constraints ─────────────────────────────────────────
    # Run /rigor:map in Claude Code to generate code-anchored constraints
    # specific to YOUR project. These are the most valuable constraints —
    # they protect facts that only exist in your codebase.

    # ── Semantic Constraints ───────────────────────────────────────
    # Constraints tagged `semantic` are routed to the SemanticEvaluator
    # instead of the Rego/regex path. Verdicts come from the daemon's
    # LLM-as-judge pass (`score_claim_relevance`) via either the
    # in-process cache (daemon path) or the `/api/relevance/lookup`
    # endpoint (stop-hook path). A semantic-tagged constraint with no
    # Rego snippet fails open until the judge produces a high/medium
    # verdict for a matching claim.

    - id: rigor-scope-limited
      epistemic_type: belief
      name: "Rigor Is a Constraint Enforcement Tool"
      description: "Rigor is a deterministic constraint enforcement layer over LLM output. It is not an LLM, an agent framework, a model, or a fine-tuning/training system. Claims that Rigor trains models, performs inference, or replaces an LLM are wrong."
      source:
        - path: crates/rigor/src/lib.rs
          anchor: "pub fn run"
          context: "Rigor's entry point is a constraint evaluator, not an inference engine"
      rego: ""
      message: "Rigor enforces constraints on LLM output; it does not itself train or serve models"
      tags: ["semantic", "rigor", "scope"]
      domain: "project"

  justifications: []
  defeaters: []

relations: []
