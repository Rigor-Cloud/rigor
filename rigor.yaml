    - id: enforcement-requires-traffic-routing
      epistemic_type: justification
      knowledge_type: empirical
      cluster_id: proxy
      credibility_weight: 1.0
      name: "Proxy-Level Enforcement Requires Traffic Routing"
      description: |
        Rigor's proxy-level enforcement (claim extraction from streams, PII
        redaction, BLOCK kill-switch, auto-retry) is active ONLY for traffic
        that flows through the daemon's MITM proxy. The daemon itself running
        in the background does nothing if the agent calls the LLM provider
        directly.

        Three ways traffic reaches the proxy:
          1. `rigor ground -- <command>` — runs the agent as a subprocess
             with env vars (ANTHROPIC_BASE_URL, HTTPS_PROXY, etc.) pointing
             at 127.0.0.1:8787. The recommended entry point.
          2. `rigor serve --background` plus the user manually exporting
             HTTPS_PROXY=http://127.0.0.1:8787 on the agent command.
          3. `rigor trust <tool>` installs a wrapper shim that applies #2
             automatically for a specific tool (claude, codex, etc.).

        The stop-hook path is orthogonal: Claude Code calls `rigor` as a
        post-response hook if configured, evaluating the completed transcript.
        This works without the daemon OR ground, but only catches violations
        after the fact — the BLOCK kill-switch and auto-retry require
        in-stream interception via the proxy.

        A running daemon with no traffic routed to it is functional but
        inert. An AI that claims "rigor protects all LLM calls automatically
        once installed" is wrong — the user must opt in via routing.
      source:
        - path: crates/rigor/src/cli/ground.rs
          anchor: "run_ground"
          context: "ground command — sets env vars + spawns agent subprocess"
        - path: crates/rigor/src/cli/trust.rs
          anchor: "install_tool_wrapper"
          context: "trust shim — wraps agent binary to set proxy env vars"
        - path: crates/rigor/src/daemon/proxy.rs
          anchor: "CONNECT"
          context: "proxy path — only engaged if client routes through 127.0.0.1:8787"
          file_sha256: "a6ea1d378d88e20332159bb15f40e905f3b404ec40a1177f5e4f9ba092cad3c6"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor.*(protects|intercepts|blocks|catches|enforces).*(all|every|any).*(LLM|API|claude|openai|call)`, c.text)
          not regex.match(`(?i)(ground|HTTPS_PROXY|routed|trust|opt.in|requires|configured)`, c.text)
          v := {
            "constraint_id": "enforcement-requires-traffic-routing",
            "violated": true,
            "claims": [c.id],
            "reason": "rigor only enforces traffic routed through the daemon (via `rigor ground`, HTTPS_PROXY env, or `rigor trust` shim). Background daemon alone is inert."
          }
        }
      message: "rigor proxy enforcement requires traffic routing via ground / HTTPS_PROXY / trust"
      tags: ["proxy", "architecture", "invariant"]
      domain: "project"

