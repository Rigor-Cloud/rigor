      credibility_weight: 1.0
      name: "Auto-Retry Max Is 1"
      description: "On BLOCK, rigor resends the request once with violation feedback injected into the system prompt. If the retry also blocks, the block is surfaced to the user. Max 1 retry — never cascading."
      source:
        - path: crates/rigor/src/daemon/proxy.rs
          anchor: "[RIGOR EPISTEMIC CORRECTION]"
          context: "retry marker — prevents double retry"
          file_sha256: "a6ea1d378d88e20332159bb15f40e905f3b404ec40a1177f5e4f9ba092cad3c6"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor.*retr(y|ies).*(2|3|5|10|N|unbound|multiple|infinite)`, c.text)
          not regex.match(`(?i)(max 1|exactly one|only one)`, c.text)
          v := {
            "constraint_id": "auto-retry-max-one",
            "violated": true,
            "claims": [c.id],
            "reason": "rigor auto-retries at most once, not multiple times"
          }
        }
      message: "rigor auto-retry is capped at 1"
      tags: ["fail-policy", "invariant"]
      domain: "project"

