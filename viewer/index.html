<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rigor — Live</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="root"></div>

  <!-- Libraries (React + Babel for in-browser JSX) -->
  <script src="/assets/lib/react.min.js"></script>
  <script src="/assets/lib/react-dom.min.js"></script>
  <script src="/assets/lib/babel-standalone.min.js"></script>

  <!-- Live data bridge (WebSocket + REST → reactive state) -->
  <script src="/assets/components/live-bridge.js"></script>

  <!-- React hook + context for live data subscription -->
  <script type="text/babel" src="/assets/components/use-rigor-data.js"></script>

  <!-- Tweaks panel (design prototyping tool) -->
  <script type="text/babel" src="/assets/components/app.jsx"></script>

  <!-- Base components: Topbar, PageTabs, Sidebar, Sparkline -->
  <script type="text/babel" src="/assets/components/base-components.js"></script>

  <!-- Constraint graph (SVG interactive) -->
  <script type="text/babel" src="/assets/components/constraint-graph.js"></script>

  <!-- Detail drawer for selected node -->
  <script type="text/babel" src="/assets/components/drawer.js"></script>

  <!-- Observability charts -->
  <script type="text/babel" src="/assets/components/obs-charts-health.js"></script>
  <script type="text/babel" src="/assets/components/obs-charts-claims.js"></script>
  <script type="text/babel" src="/assets/components/obs-charts-heatmap.js"></script>
  <script type="text/babel" src="/assets/components/obs-charts-sankey.js"></script>

  <!-- Pages: Observability, Search, Eval, Constraints -->
  <script type="text/babel" src="/assets/components/pages.js"></script>

  <!-- Main App entry (must be last — references all components above) -->
  <script type="text/babel" src="/assets/components/app.js"></script>
</body>
</html>
