<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0d0da"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#51cf66"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bg)"/>
  <rect width="400" height="400" rx="48" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Constraint brackets -->
  <path d="M 52 145 L 38 145 L 38 255 L 52 255" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M 348 145 L 362 145 L 362 255 L 348 255" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  
  <!-- r -->
  <path d="M 66 230 L 66 185 Q 66 168 83 168 L 96 168" fill="none" stroke="url(#textGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- i -->
  <line x1="116" y1="176" x2="116" y2="230" stroke="url(#textGrad)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="116" cy="156" r="5.5" fill="#748ffc"/>
  
  <!-- g -->
  <path d="M 160 168 L 142 168 Q 132 168 132 180 L 132 218 Q 132 230 142 230 L 160 230 L 160 168 L 160 250 Q 160 264 146 264 L 136 264" fill="none" stroke="url(#textGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- o -->
  <rect x="176" y="168" width="42" height="62" rx="12" fill="none" stroke="url(#textGrad)" stroke-width="8"/>
  
  <!-- r -->
  <path d="M 236 230 L 236 185 Q 236 168 253 168 L 266 168" fill="none" stroke="url(#textGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Graph emanating from the wordmark -->
  <line x1="280" y1="178" x2="320" y2="162" stroke="#748ffc" stroke-width="1.5" opacity="0.35"/>
  <line x1="280" y1="198" x2="316" y2="200" stroke="#51cf66" stroke-width="1.5" opacity="0.35"/>
  <line x1="280" y1="218" x2="320" y2="238" stroke="#ff6b6b" stroke-width="1.5" opacity="0.35"/>
  
  <circle cx="324" cy="160" r="5" fill="#748ffc" opacity="0.5"/>
  <circle cx="320" cy="200" r="4.5" fill="#51cf66" opacity="0.5"/>
  <circle cx="324" cy="240" r="5" fill="#ff6b6b" opacity="0.5"/>
  
  <!-- Cross-links between nodes -->
  <line x1="324" y1="165" x2="320" y2="196" stroke="#748ffc" stroke-width="1" opacity="0.2"/>
  <line x1="320" y1="204" x2="324" y2="236" stroke="#51cf66" stroke-width="1" opacity="0.2"/>
</svg>
