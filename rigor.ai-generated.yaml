# Rigor constraint configuration for the rigor project itself
# Generated by: AI analysis of codebase (2026-04-10)
# Project type: Rust
#
# This is an AI-generated constraint set based on deep analysis of:
# - Architecture: 8-step evaluation pipeline, DF-QuAD argumentation, Rego policies
# - Dependencies: regorus 0.2, clap 4.5, axum 0.8, tokio, serde, git2
# - Domain knowledge: bipolar argumentation, epistemic logic, OPA/Rego
# - Known pitfalls: DF-QuAD formula (product not mean), HashMap non-determinism

constraints:
  beliefs:
    # === DEPENDENCY ACCURACY ===

    - id: regorus-capabilities
      epistemic_type: belief
      name: "Regorus Capabilities Accuracy"
      description: "regorus is a SUBSET of OPA — it does not support all OPA built-ins. Claims must not attribute full OPA features to regorus."
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)regorus.*(supports|provides|enables|can)`, c.text)
          regex.match(`(?i)(streaming|async|parallel|hot.reload|watch.mode|interactive|IDE|http\.send|opa\.runtime|net\.cidr)`, c.text)
          v := {
            "constraint_id": "regorus-capabilities",
            "violated": true,
            "claims": [c.id],
            "reason": "regorus is a subset of OPA and does not support this feature"
          }
        }
      message: "Inaccurate regorus capability claim — regorus is a Rego subset, not full OPA"
      tags: ["regorus", "dependency", "api"]
      domain: "rigor"
      references:
        - "https://github.com/microsoft/regorus"
        - "https://docs.rs/regorus/latest/regorus/"

    - id: no-fabricated-apis
      epistemic_type: belief
      name: "No Fabricated APIs"
      description: "Claims about rigor's own API must match actual exported functions and types"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor\.(Engine|Value|fabricated|nonexistent|auto_fix)`, c.text)
          v := {
            "constraint_id": "no-fabricated-apis",
            "violated": true,
            "claims": [c.id],
            "reason": sprintf("Fabricated rigor API: %v", [c.text])
          }
        }

        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(PolicyEngine|ArgumentationGraph|HeuristicExtractor)\.(fabricated|nonexistent|auto_|magic)`, c.text)
          v := {
            "constraint_id": "no-fabricated-apis",
            "violated": true,
            "claims": [c.id],
            "reason": sprintf("Fabricated method on rigor type: %v", [c.text])
          }
        }
      message: "Fabricated API claim — method or type does not exist in rigor"
      tags: ["api", "hallucination", "rigor"]
      domain: "rigor"

    # === ARCHITECTURE ACCURACY ===

    - id: pipeline-accuracy
      epistemic_type: belief
      name: "Pipeline Architecture Accuracy"
      description: "The evaluation pipeline is 8 steps in lib.rs. Claims must not invent extra steps or skip existing ones."
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(rigor|pipeline).*(10|12|15|20).*(step|stage|phase)`, c.text)
          c.confidence > 0.8
          v := {
            "constraint_id": "pipeline-accuracy",
            "violated": true,
            "claims": [c.id],
            "reason": "Rigor pipeline has 8 steps, not the number claimed"
          }
        }

        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor.*(database|network|http|api call|external service)`, c.text)
          regex.match(`(?i)(uses|requires|depends|connects|calls)`, c.text)
          c.confidence > 0.8
          v := {
            "constraint_id": "pipeline-accuracy",
            "violated": true,
            "claims": [c.id],
            "reason": "Rigor's evaluation pipeline has no database, network calls, or external dependencies"
          }
        }
      message: "Inaccurate claim about rigor's pipeline architecture"
      tags: ["architecture", "pipeline", "rigor"]
      domain: "rigor"

    # === DF-QuAD SEMANTICS ===

    - id: dfquad-semantics
      epistemic_type: belief
      name: "DF-QuAD Semantics Accuracy"
      description: "DF-QuAD uses product aggregation and two-case influence function, not mean/sum"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)df.quad`, c.text)
          regex.match(`(?i)(binary|boolean|true.false|yes.no)`, c.text)
          v := {
            "constraint_id": "dfquad-semantics",
            "violated": true,
            "claims": [c.id],
            "reason": "DF-QuAD uses gradual semantics [0,1], not binary acceptance"
          }
        }

        violation contains v if {
          some c in input.claims
          regex.match(`(?i)df.quad.*(sum|add|mean|average|cumulative)`, c.text)
          regex.match(`(?i)(aggregat|strength|weight)`, c.text)
          v := {
            "constraint_id": "dfquad-semantics",
            "violated": true,
            "claims": [c.id],
            "reason": "DF-QuAD uses PRODUCT aggregation (prod(1-s_i)), not sum or mean"
          }
        }
      message: "Inaccurate DF-QuAD claim — misrepresents formal semantics"
      tags: ["dfquad", "argumentation", "domain"]
      domain: "rigor"
      references:
        - "Rago et al. 2016: Discontinuity-Free Decision Support with Quantitative Argumentation Debates"

    # === REGO SYNTAX ===

    - id: rego-syntax-accuracy
      epistemic_type: belief
      name: "Rego Syntax Accuracy"
      description: "Rigor uses Rego v1 syntax via regorus. Claims must use 'violation contains v if' not deprecated 'violation[msg]'"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rego.*(syntax|uses|requires)`, c.text)
          regex.match(`(?i)(violation\[|rule\[)`, c.text)
          not regex.match(`(?i)(rego\.v1|contains|import rego)`, c.text)
          v := {
            "constraint_id": "rego-syntax-accuracy",
            "violated": true,
            "claims": [c.id],
            "reason": "Rego syntax claim uses deprecated syntax instead of rego.v1"
          }
        }

        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rego.*(supports|has).*(classes|inheritance|async|goroutine)`, c.text)
          c.confidence > 0.7
          v := {
            "constraint_id": "rego-syntax-accuracy",
            "violated": true,
            "claims": [c.id],
            "reason": "Claimed Rego feature does not exist in specification"
          }
        }
      message: "Incorrect Rego syntax claim"
      tags: ["rego", "syntax", "domain"]
      domain: "rigor"
      references:
        - "https://www.openpolicyagent.org/docs/latest/policy-language/"

    # === FAIL-OPEN BEHAVIOR ===

    - id: fail-open-accuracy
      epistemic_type: belief
      name: "Fail-Open Behavior Accuracy"
      description: "Rigor fails open by default. Claims that rigor blocks on errors are wrong unless RIGOR_FAIL_CLOSED is set."
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor.*(crash|error|fail).*(block|reject|deny|stop)`, c.text)
          not regex.match(`(?i)(RIGOR_FAIL_CLOSED|fail.closed|opt.in)`, c.text)
          c.confidence > 0.8
          v := {
            "constraint_id": "fail-open-accuracy",
            "violated": true,
            "claims": [c.id],
            "reason": "Rigor fails open by default — errors produce allow, not block"
          }
        }
      message: "Inaccurate claim about rigor's error handling behavior"
      tags: ["fail-open", "behavior", "rigor"]
      domain: "rigor"

    # === NO FALSE TEST CLAIMS ===

    - id: no-false-test-claims
      epistemic_type: belief
      name: "No False Test Claims"
      description: "Claims about test results must accurately reflect what tests verify"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(100% coverage|all tests pass|fully tested|zero bugs)`, c.text)
          c.confidence > 0.9
          v := {
            "constraint_id": "no-false-test-claims",
            "violated": true,
            "claims": [c.id],
            "reason": "Absolute test/quality claim without qualification"
          }
        }
      message: "False test claim detected"
      tags: ["testing", "verification", "general"]
      domain: "general"

    # === SEVERITY THRESHOLD ACCURACY ===

    - id: severity-thresholds
      epistemic_type: belief
      name: "Severity Threshold Accuracy"
      description: "Block >= 0.7, Warn >= 0.4, Allow < 0.4. Claims must use correct thresholds."
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(block|blocking).*(threshold|at|above|when)`, c.text)
          regex.match(`(?i)(0\.[89]|0\.5|0\.6)`, c.text)
          not regex.match(`(?i)0\.7`, c.text)
          v := {
            "constraint_id": "severity-thresholds",
            "violated": true,
            "claims": [c.id],
            "reason": "Block threshold is 0.7, not the value claimed"
          }
        }
      message: "Incorrect severity threshold value"
      tags: ["severity", "thresholds", "rigor"]
      domain: "rigor"

  justifications:
    # === EVIDENCE REQUIREMENTS ===

    - id: test-evidence-supports
      epistemic_type: justification
      name: "Test Evidence Required"
      description: "Functional claims about rigor need test evidence"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(works|functions|correctly|successfully)`, c.text)
          not regex.match(`(?i)(test|tested|verified|confirmed|benchmark)`, c.text)
          c.confidence > 0.85
          c.claim_type == "assertion"
          v := {
            "constraint_id": "test-evidence-supports",
            "violated": true,
            "claims": [c.id],
            "reason": "Functional claim lacks test evidence"
          }
        }

        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(fast|performant|optimized|efficient|low.latency)`, c.text)
          not regex.match(`(?i)(benchmark|measured|profiled|ms|millisecond)`, c.text)
          c.confidence > 0.8
          v := {
            "constraint_id": "test-evidence-supports",
            "violated": true,
            "claims": [c.id],
            "reason": "Performance claim without benchmark evidence"
          }
        }
      message: "Claim lacks test/benchmark evidence"
      tags: ["testing", "evidence"]
      domain: "general"

    - id: hedged-language
      epistemic_type: justification
      name: "Hedged Language for Uncertainty"
      description: "Low-confidence claims must use hedging language"
      rego: |
        violation contains v if {
          some c in input.claims
          c.confidence < 0.7
          not regex.match(`(?i)(may|might|could|possibly|probably|likely|appears|seems)`, c.text)
          regex.match(`(?i)(is|are|will|does|has|supports)`, c.text)
          v := {
            "constraint_id": "hedged-language",
            "violated": true,
            "claims": [c.id],
            "reason": "Low-confidence claim uses definitive language without hedging"
          }
        }
      message: "Uncertain claim lacks hedging"
      tags: ["uncertainty", "hedging"]
      domain: "general"

  defeaters:
    # === CONTRADICTION DETECTORS ===

    - id: prototype-defeats-production
      epistemic_type: defeater
      name: "Prototype Defeats Production Claims"
      description: "WIP/prototype markers contradict production-ready claims"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)(production.ready|stable|complete|finished|ship)`, c.text)
          c.confidence > 0.8
          some p in input.claims
          regex.match(`(?i)(prototype|experimental|wip|todo|fixme|draft|v0\.)`, p.text)
          v := {
            "constraint_id": "prototype-defeats-production",
            "violated": true,
            "claims": [c.id, p.id],
            "reason": "Production-ready claim contradicted by prototype/WIP markers"
          }
        }
      message: "Prototype markers contradict production-ready claim"
      tags: ["prototype", "maturity"]
      domain: "general"

    - id: latency-defeats-performance
      epistemic_type: defeater
      name: "Latency Claims Require Benchmarks"
      description: "Claims about rigor's latency must cite actual benchmark numbers"
      rego: |
        violation contains v if {
          some c in input.claims
          regex.match(`(?i)rigor.*(fast|instant|zero.latency|no.overhead|negligible)`, c.text)
          not regex.match(`(?i)(\d+\s*ms|millisecond|benchmark|measured|criterion)`, c.text)
          c.confidence > 0.8
          v := {
            "constraint_id": "latency-defeats-performance",
            "violated": true,
            "claims": [c.id],
            "reason": "Latency claim without specific benchmark numbers"
          }
        }
      message: "Latency claim lacks benchmark evidence"
      tags: ["performance", "latency"]
      domain: "rigor"

# Argumentation relations
relations:
  # Test evidence supports core beliefs
  - from: test-evidence-supports
    to: no-fabricated-apis
    relation_type: supports

  - from: test-evidence-supports
    to: regorus-capabilities
    relation_type: supports

  - from: test-evidence-supports
    to: pipeline-accuracy
    relation_type: supports

  # Hedging supports DF-QuAD accuracy (uncertain claims about formal semantics need hedging)
  - from: hedged-language
    to: dfquad-semantics
    relation_type: supports

  - from: hedged-language
    to: rego-syntax-accuracy
    relation_type: supports

  # Prototype markers attack production/completeness claims
  - from: prototype-defeats-production
    to: no-fabricated-apis
    relation_type: attacks

  # NOTE: prototype-defeats-production does NOT attack no-false-test-claims
  # because rigor is a shipped project (v0.1), not a prototype.
  # Test integrity must be maintained regardless of WIP markers in new features.

  # Latency defeater attacks performance claims
  - from: latency-defeats-performance
    to: pipeline-accuracy
    relation_type: attacks
