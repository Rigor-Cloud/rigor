<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8c8d8"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#748ffc"/>
      <stop offset="100%" stop-color="#51cf66"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Constraint bracket left -->
  <path d="M 68 140 L 56 140 L 56 260 L 68 260" fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Constraint bracket right -->
  <path d="M 332 140 L 344 140 L 344 260 L 332 260" fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Main wordmark: rigor -->
  <!-- r -->
  <path d="M 82 220 L 82 175 Q 82 160 97 160 L 108 160" fill="none" stroke="url(#textGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- i -->
  <line x1="124" y1="168" x2="124" y2="220" stroke="url(#textGrad)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="124" cy="152" r="4.5" fill="#748ffc"/>
  
  <!-- g -->
  <path d="M 163 160 L 146 160 Q 138 160 138 170 L 138 210 Q 138 220 146 220 L 163 220 L 163 160 L 163 240 Q 163 252 151 252 L 142 252" fill="none" stroke="url(#textGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- o -->
  <rect x="178" y="160" width="36" height="60" rx="10" fill="none" stroke="url(#textGrad)" stroke-width="7"/>
  
  <!-- r -->
  <path d="M 230 220 L 230 175 Q 230 160 245 160 L 256 160" fill="none" stroke="url(#textGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Verification dot on the i — pulsing accent -->
  <circle cx="124" cy="152" r="4.5" fill="#748ffc">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Subtle constraint graph lines -->
  <line x1="270" y1="170" x2="310" y2="155" stroke="#748ffc" stroke-width="1.2" opacity="0.25"/>
  <line x1="270" y1="190" x2="305" y2="200" stroke="#51cf66" stroke-width="1.2" opacity="0.25"/>
  <line x1="270" y1="210" x2="310" y2="230" stroke="#ff6b6b" stroke-width="1.2" opacity="0.25"/>
  
  <!-- Graph nodes -->
  <circle cx="314" cy="153" r="4" fill="#748ffc" opacity="0.4"/>
  <circle cx="309" cy="200" r="3.5" fill="#51cf66" opacity="0.4"/>
  <circle cx="314" cy="232" r="4" fill="#ff6b6b" opacity="0.4"/>
  
  <!-- Tagline -->
  <text x="200" y="290" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="11" fill="#666" letter-spacing="3">EPISTEMIC GROUNDING</text>
</svg>
